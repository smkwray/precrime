dataset: nij_recidivism_forecasting_challenge
version: "2021-03-29"
source: "https://nij.ojp.gov/funding/recidivism-forecasting-challenge"
notes:
  - "Canonical field definitions come from NIJ Appendix 2 codebook."
  - "This schema keys on CSV column names used in NIJ training/test files."
  - "Columns `_v1`..`_v4` are retained as-is and mapped via `canonical_name`."
fields:
  - position: 1
    name: ID
    canonical_name: ID
    type: integer_identifier
    family: id
    description: Unique person ID.
    missing_value_encoding: none
  - position: 2
    name: Gender
    canonical_name: Gender
    type: categorical_binary
    family: sensitive
    description: Gender (M/F).
    missing_value_encoding: none
  - position: 3
    name: Race
    canonical_name: Race
    type: categorical_binary
    family: sensitive
    description: Race (Black or White in challenge sample).
    missing_value_encoding: none
  - position: 4
    name: Age_at_Release
    canonical_name: Age_at_Release
    type: ordinal_category
    family: sensitive
    description: Age group at prison release.
    missing_value_encoding: none
  - position: 5
    name: Residence_PUMA
    canonical_name: Residence_PUMA
    type: categorical_code
    family: static_release
    description: Combined U.S. Census PUMA group at prison release.
    missing_value_encoding: none
  - position: 6
    name: Gang_Affiliated
    canonical_name: Gang_Affiliated
    type: categorical_binary
    family: static_release
    description: Verified gang affiliation.
    missing_value_encoding: blank string = missing/unknown
  - position: 7
    name: Supervision_Risk_Score_First
    canonical_name: Supervision_Risk_Score_First
    type: ordinal_integer
    family: static_release
    description: First parole supervision risk score (1-10, lower is lower risk).
    missing_value_encoding: blank string = missing
  - position: 8
    name: Supervision_Level_First
    canonical_name: Supervision_Level_First
    type: categorical_nominal
    family: static_release
    description: First supervision level assignment (Standard/High/Specialized).
    missing_value_encoding: blank string = missing
  - position: 9
    name: Education_Level
    canonical_name: Education_Level
    type: ordinal_category
    family: static_release
    description: Education grade level at prison entry.
    missing_value_encoding: none
  - position: 10
    name: Dependents
    canonical_name: Dependents
    type: ordinal_category
    family: static_release
    description: Number of dependents at prison entry.
    missing_value_encoding: none
  - position: 11
    name: Prison_Offense
    canonical_name: Prison_Offense
    type: categorical_nominal
    family: static_release
    description: Primary prison conviction offense group.
    missing_value_encoding: blank string = missing
  - position: 12
    name: Prison_Years
    canonical_name: Prison_Years
    type: ordinal_category
    family: static_release
    description: Years in prison before parole release.
    missing_value_encoding: none
